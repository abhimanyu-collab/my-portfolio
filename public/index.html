<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Student Portfolio</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f4f4f4; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { background-color: #28a745; color: white; padding: 10px 20px; border: none; cursor: pointer; }
        button:hover { background-color: #218838; }
        .visitor-card { background: #f9f9f9; border-left: 4px solid #28a745; padding: 10px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to My Portfolio</h1>
        <p>This creates a Full Stack connection between Frontend, Backend, and Database.</p>

        <h3>Sign my Guestbook (Database Test)</h3>
        <form action="/add-visitor" method="POST">
            <input type="text" name="name" placeholder="Your Name" required>
            <textarea name="message" placeholder="Your Message" required></textarea>
            <button type="submit">Submit to Database</button>
        </form>

        <hr>

        <h3>Recent Visitors (Loaded from MongoDB):</h3>
        <div id="visitor-list">Loading data...</div>
    </div>

    <script>
        // Fetch data from Backend when page loads
        fetch('/visitors')
            .then(response => response.json())
            .then(data => {
                const list = document.getElementById('visitor-list');
                list.innerHTML = '';
                if(data.length === 0) {
                    list.innerHTML = 'No visitors yet. Be the first!';
                }
                data.forEach(visitor => {
                    list.innerHTML += `
                        <div class="visitor-card">
                            <strong>${visitor.name}</strong> says:<br>
                            ${visitor.message}
                        </div>`;
                });
            })
            .catch(err => {
                document.getElementById('visitor-list').innerHTML = 'Error loading data. Is the server running?';
            });
    </script>
</body>
</html>
